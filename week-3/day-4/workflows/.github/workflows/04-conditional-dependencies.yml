name: Conditional Jobs and Dependencies

on:
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "Run deploy job?"
        required: true
        default: true
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test_status: ${{ steps.result.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "Running tests..."
          echo "All tests passed."

      - name: Save test status
        id: result
        run: echo "status=passed" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ needs.test.outputs.test_status == 'passed' }}

    steps:
      - name: Build application
        run: echo "Building application after tests passed..."

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: ${{ inputs.run_deploy == true && needs.test.outputs.test_status == 'passed' }}

    steps:
      - name: Deploy application
        run: echo "Deploying application..."
