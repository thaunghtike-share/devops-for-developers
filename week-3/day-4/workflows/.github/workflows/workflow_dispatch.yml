name: Manual Docker Build

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Choose Docker service to build"
        required: true
        default: "frontend"
        type: choice
        options:
          - frontend
          - backend
          - integration

env:
  ACR_REGISTRY: learndevopsnow.azurecr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker variables
        run: |
          echo "APP_NAME=${{ inputs.service }}-app" >> $GITHUB_ENV
          echo "DOCKERFILE=apps/${{ inputs.service }}/Dockerfile" >> $GITHUB_ENV

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -f $DOCKERFILE \
            -t $ACR_REGISTRY/$APP_NAME:${IMAGE_TAG::7} \
            .