name: Release Tags Demo

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show release information
        run: |
          echo "Ref: $GITHUB_REF"
          echo "Ref Name: $GITHUB_REF_NAME"
          echo "Event Name: $GITHUB_EVENT_NAME"

      - name: Build release package
        run: |
          mkdir -p release
          echo "Release version: $GITHUB_REF_NAME" > release/version.txt
          echo "Build commit: $GITHUB_SHA" >> release/version.txt

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package-${{ github.ref_name }}
          path: release/
