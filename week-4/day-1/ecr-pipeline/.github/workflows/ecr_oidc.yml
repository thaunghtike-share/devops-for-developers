name: Push Docker Image To AWS ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: learndevopsnow
  AWS_ACCOUNT_ID: 265xxxxxxxxxxxx # Replace Your ASW ACCOUNT ID
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials Using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::265xxxxxx:role/github-actions-ecr-role # Replace Your ASW ACCOUNT ID
          aws-region: ap-southeast-1

      - name: Login To Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push Docker Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -f Dockerfile \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${IMAGE_TAG::7} \
            .